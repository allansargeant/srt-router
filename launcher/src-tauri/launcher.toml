# SRT Router launcher config — paths are relative to the app's bundled
# resources (see tauri.conf.json `bundle.resources`), so the shipped .app is
# self-contained: it carries the srtrouter binary and a config template.
#
# cwd is omitted on purpose: the launcher then runs the server from its writable
# app-config dir, where it also writes the rendered config and state/.

[app]
name = "SRT Router"
command = "bin/srtrouter"
args = ["--config", "{config}"]
url = "http://{host}:{port}/"
default_port = 8080

[inject]
mode = "configfile"

[inject.configfile]
template = "bin/server-config.toml"
set_key = "web.bind"
value = "{host}:{port}"

# Palette mirrored from srt-router's web UI (dark slate + periwinkle accent).
[app.theme]
bg = "#14161a"
panel = "#1a1d24"
"panel-2" = "#22262e"
border = "#2a2d33"
text = "#e6e6e6"
muted = "#b7bfca"
dim = "#6b7280"
accent = "#9fb4ff"
"accent-soft" = "#1c2333"
good = "#37835c"
