<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect width="900" height="340" fill="#14161a"/>
  <rect x="500" y="70" width="360" height="200" rx="8" fill="#1a1d24" stroke="#2a2d33" stroke-dasharray="3 3"/>

  <text x="24" y="34" fill="#9fb4ff" font-size="17" font-weight="600">one crosspoint, two ways of filling a Bytes chunk</text>

  <!-- SRT path -->
  <text x="24" y="70" fill="#b7bfca" font-size="13" font-weight="600">SRT (pure relay)</text>
  <rect x="24" y="86" width="160" height="44" rx="6" fill="#1c1f26" stroke="#2a2d33"/>
  <text x="104" y="113" fill="#e6e6e6" text-anchor="middle" font-size="12">SRT socket payload</text>
  <path d="M184,108 L260,108" fill="none" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="264" y="86" width="150" height="44" rx="6" fill="#1a2320" stroke="#3a5f4a"/>
  <text x="339" y="108" fill="#d4ffe6" text-anchor="middle" font-size="12" font-weight="600">Bytes chunk</text>
  <text x="339" y="122" fill="#8fbfa2" text-anchor="middle" font-size="10">sent unmodified</text>
  <path d="M414,108 L490,108" fill="none" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="518" y="102" fill="#8a8f98" font-size="11">crosspoint-core</text>
  <text x="518" y="118" fill="#8a8f98" font-size="11">(unaware of either transport)</text>

  <!-- NDI path -->
  <text x="24" y="170" fill="#b7bfca" font-size="13" font-weight="600">NDI (envelope, crates/ndi-io/src/envelope.rs)</text>
  <rect x="24" y="186" width="160" height="60" rx="6" fill="#1c1f26" stroke="#2a2d33"/>
  <text x="104" y="208" fill="#e6e6e6" text-anchor="middle" font-size="12">VideoFrame /</text>
  <text x="104" y="222" fill="#e6e6e6" text-anchor="middle" font-size="12">AudioFrame /</text>
  <text x="104" y="236" fill="#e6e6e6" text-anchor="middle" font-size="12">MetadataFrame</text>
  <path d="M184,216 L260,216" fill="none" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="222" y="205" fill="#6b7280" text-anchor="middle" font-size="10">encode</text>
  <rect x="264" y="186" width="150" height="60" rx="6" fill="#1a2320" stroke="#3a5f4a"/>
  <text x="339" y="212" fill="#d4ffe6" text-anchor="middle" font-size="12" font-weight="600">Bytes chunk</text>
  <text x="339" y="228" fill="#8fbfa2" text-anchor="middle" font-size="10">kind byte + fields</text>
  <text x="339" y="240" fill="#8fbfa2" text-anchor="middle" font-size="10">+ raw frame data</text>
  <path d="M414,216 L490,216" fill="none" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="452" y="205" fill="#6b7280" text-anchor="middle" font-size="10">decode</text>
  <text x="518" y="212" fill="#8a8f98" font-size="11">same crosspoint-core,</text>
  <text x="518" y="228" fill="#8a8f98" font-size="11">same Bytes broadcast channel</text>

  <text x="680" y="256" fill="#6b7280" text-anchor="middle" font-size="11">crates/core never sees a VideoFrame or an</text>
  <text x="680" y="270" fill="#6b7280" text-anchor="middle" font-size="11">SRT socket — only Bytes. A transport crate's</text>
  <text x="680" y="284" fill="#6b7280" text-anchor="middle" font-size="11">own job is turning its native frames into (and</text>
  <text x="680" y="298" fill="#6b7280" text-anchor="middle" font-size="11">back out of) that shared, opaque shape.</text>

  <line x1="24" y1="316" x2="900" y2="316" stroke="#2a2d33"/>
  <text x="24" y="332" fill="#565b64" font-size="11">Consequence: an SRT source can't be routed to an NDI output (or vice versa) without real transcoding — different envelope, not just different wire format.</text>
</svg>
